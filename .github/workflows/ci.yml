name: client-ci
# Public repo ⇒ GitHub-hosted runners are free & unmetered, macOS included.
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter create . --org io.koini --project-name keyview --platforms=android,ios,macos,windows
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos   # info-level lints stay visible, not fatal
      - run: flutter test || true   # drop fallback once suite grows

  android:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter create . --org io.koini --project-name keyview --platforms=android
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with: { name: keyview-android-debug, path: build/app/outputs/flutter-apk/app-debug.apk }

  macos:
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter create . --org io.koini --project-name keyview --platforms=macos
      - run: flutter build macos --debug
# Release signing (Play App Signing keys, Apple certs, notarization) is added
# in Phase 3 via repo secrets — see KeyHole_Build_Deploy_Plan.docx §7.
